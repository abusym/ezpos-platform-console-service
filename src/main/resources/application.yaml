# 默认激活开发环境
spring:
  application:
    name: ezpos-saas-console
  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  profiles:
    active: dev
  mvc:
    problemdetails:
      enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: "1"
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 5s
      repositories:
        enabled: false

ezpos:
  security:
    opaque-token:
      access-token-ttl: ${EZPOS_OPAQUE_TOKEN_TTL:24h}
      redis-key-prefix: ${EZPOS_OPAQUE_TOKEN_REDIS_KEY_PREFIX:ezpos:platform:opaque-token:}

snowflake:
  machine-id: ${EZPOS_SNOWFLAKE_MACHINE_ID:1}
  epoch: ${EZPOS_SNOWFLAKE_EPOCH:1735689600000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
